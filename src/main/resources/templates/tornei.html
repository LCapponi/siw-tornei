<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="navbar">
    <a th:href="@{/tornei}"><strong>Tornei</strong></a>
    <a th:href="@{/squadre}">Squadre</a>
    <span sec:authorize="isAnonymous()">
        <a th:href="@{/login}">Login</a>
        <a th:href="@{/register}">Registrati</a>
    </span>
    <span sec:authorize="isAuthenticated()">
        Ciao, <span sec:authentication="name">utente</span>
        <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/admin/tornei/nuovo}">+ Torneo</a>
        <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/admin/squadre/nuova}">+ Squadra</a>
        <a sec:authorize="hasAuthority('ADMIN')" th:href="@{/admin/partite/nuova}">+ Partita</a>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit">Logout</button>
        </form>
    </span>
</div>
<main>
    <h1>Tornei</h1>
    <ul class="lista">
        <li th:each="t : ${tornei}">
            <a th:href="@{|/tornei/${t.id}|}" th:text="${t.nome}"></a>
            (<span th:text="${t.anno}"></span>)
        </li>
    </ul>
</main>
</body>
</html>
